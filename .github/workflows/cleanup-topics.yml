name: Cleanup topics

# Handmatig te starten: laat Claude alle bestaande topics beoordelen en
# verwijdert de topics zonder Ajax-connectie (wedtips, algemeen voetbalnieuws,
# niet-voetbal). Resultaat verschijnt in de run-samenvatting.
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Ruim niet-Ajax-topics op
        run: |
          HTTP_CODE=$(curl -s --max-time 300 -o response.json -w '%{http_code}' \
            -X POST "${{ vars.APP_URL }}/api/admin/cleanup-topics" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}")
          echo "HTTP $HTTP_CODE"
          jq . response.json 2>/dev/null || cat response.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::cleanup-topics gaf HTTP $HTTP_CODE — zie de response hierboven"
            exit 1
          fi
          {
            echo "## Cleanup topics"
            echo ""
            echo "Gecontroleerd: $(jq -r '.checked' response.json) — verwijderd: $(jq -r '.removed' response.json) — mislukte reviewbatches: $(jq -r '.reviewErrors // 0' response.json)"
            echo ""
            echo "### Verwijderde topics"
            echo '```'
            jq -r 'if (.removedTitles | length) == 0 then "geen" else .removedTitles[] end' response.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
