name: Seed sources

on:
  workflow_dispatch:
    inputs:
      overwrite_enabled:
        description: "Enabled-vlaggen uit sources.seed.ts overnemen (zet bronnen aan/uit volgens de seed)"
        type: boolean
        default: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Seed sources via admin API
        run: |
          QUERY=""
          if [ "${{ inputs.overwrite_enabled }}" = "true" ]; then
            QUERY="?overwriteEnabled=1"
          fi
          curl -sf -X POST "${{ vars.APP_URL }}/api/admin/seed-sources$QUERY" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}"
